services:
  db:
    image: postgres:16-alpine
    container_name: marketplace-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: marketplace
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: marketplace-api
    ports:
      - "8080:8080"
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=marketplace
      - DB_USER=postgres
      - DB_PASSWORD=password
      # Override these in production: do NOT commit real tokens to git
      - ADMIN_TOKEN=admin-dev-token-change-me
      - RESELLER_TOKEN=reseller-dev-token-change-me
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: marketplace-frontend
    ports:
      - "3000:80"
    depends_on:
      - api

volumes:
  postgres_data:
