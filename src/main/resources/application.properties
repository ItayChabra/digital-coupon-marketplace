spring.application.name=DigitalCouponMarketplace

# PostgreSQL Database Configuration
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:marketplace}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:password}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate Settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.mvc.pathmatch.matching-strategy=ant_path_matcher
spring.jackson.property-naming-strategy=SNAKE_CASE

# Server
server.port=8080

# Security tokens: override these via environment variables in production
app.security.admin-token=${ADMIN_TOKEN:admin-dev-token-change-me}
app.security.reseller-token=${RESELLER_TOKEN:reseller-dev-token-change-me}
